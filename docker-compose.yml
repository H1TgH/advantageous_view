  services:
    backend:
      build: .
      depends_on:
        db:
          condition: service_healthy
      command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
      ports:
        - "8000:8000"
      env_file:
        - ".env"
      volumes:
        - ./src:/app

    db:
      image: postgres:16-alpine
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
        interval: 5s
        timeout: 5s
        retries: 5
      env_file:
        ".env"
      volumes:
        - postgres_data:/var/lib/postgresql/data
    
  volumes:
    postgres_data: